<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gabo - Panel Multi-Equipo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; padding: 30px; }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 40px; }
        #panel { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 25px; width: 300px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .name { font-size: 1.3em; color: #f0f6fc; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; }
        .ip { font-family: 'Consolas', monospace; font-size: 2.2em; color: #39d353; font-weight: bold; margin: 10px 0; }
        .time { font-size: 0.85em; color: #8b949e; }
    </style>
</head>
<body>
    <h1>Equipos de Tesis Conectados</h1>
    <div id="panel">Buscando reportes...</div>

    <script>
        async function actualizarPanel() {
            try {
                // Leer la lista de archivos del repositorio de Gabox24
                const res = await fetch('https://api.github.org/repos/Gabox24/control-red/contents/');
                const archivos = await res.json();
                
                const panel = document.getElementById('panel');
                panel.innerHTML = ""; // Limpiar antes de refrescar

                // Filtrar archivos que representan a una PC (ej: pc_gabo.json)
                const reportes = archivos.filter(f => f.name.startsWith('pc_') && f.name.endsWith('.json'));

                for (let file of reportes) {
                    const dataRes = await fetch(file.download_url + '?t=' + new Date().getTime());
                    const data = await dataRes.json();

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="name">🖥️ ${data.pc}</div>
                        <div class="ip">${data.ip}</div>
                        <div class="time">Último reporte: ${data.fecha}</div>
                    `;
                    panel.appendChild(card);
                }
            } catch (err) { console.error("Error cargando datos:", err); }
        }

        actualizarPanel();
        setInterval(actualizarPanel, 60000); // Refrescar cada minuto
    </script>
</body>
</html>
